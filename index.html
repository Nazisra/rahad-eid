<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ঈদ সালামি ধরো: বাংলা সংস্করণ</title>

<style>
body{
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(circle at 15% 20%, rgba(59,130,246,.18), transparent 35%),
radial-gradient(circle at 80% 10%, rgba(16,185,129,.15), transparent 28%),
linear-gradient(135deg,#0f172a,#111827 50%, #1f2937);
font-family:"Hind Siliguri","Noto Sans Bengali",Arial,sans-serif;
color:#f9fafb;
}

.game-shell{
width:min(980px,96vw);
padding:18px;
border-radius:18px;
border:1px solid rgba(255,255,255,.14);
background:linear-gradient(180deg, rgba(30,41,59,.85), rgba(15,23,42,.92));
backdrop-filter: blur(6px);
box-shadow:0 24px 55px rgba(0,0,0,.42);
text-align:center;
}

h1{
margin:0 0 6px 0;
font-size:30px;
}

p{
margin:0 0 12px 0;
opacity:.9;
font-size:14px;
}

canvas{
border:3px solid #c084fc;
background:#0f172a;
border-radius:12px;
box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), 0 10px 30px rgba(0,0,0,.4);
max-width:100%;
height:auto;
}
</style>

</head>

<body>

<div class="game-shell">
<h1>ঈদ সালামি ধরো 🇧🇩</h1>
<p>Windows: ← → / A D · Android: Touch control · Space = শুরু/বিরতি · R = নতুন খেলা</p>

<canvas id="gameCanvas" width="900" height="450"></canvas>
</div>

<script src="game.js"></script>

</body>
</html>
