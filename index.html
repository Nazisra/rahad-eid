<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ঈদ সালামি ধরো: বাংলা সংস্করণ</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
background:
radial-gradient(circle at 15% 20%, rgba(59,130,246,.18), transparent 35%),
radial-gradient(circle at 80% 10%, rgba(16,185,129,.15), transparent 28%),
linear-gradient(135deg,#0f172a,#111827 50%, #1f2937);
font-family:"Hind Siliguri","Noto Sans Bengali",Arial,sans-serif;
color:#f9fafb;
overflow:hidden;
}

.game-shell{
width:min(1120px,98vw);
max-height:96vh;
padding:14px;
border-radius:18px;
border:1px solid rgba(255,255,255,.14);
background:linear-gradient(180deg, rgba(30,41,59,.85), rgba(15,23,42,.92));
backdrop-filter: blur(6px);
box-shadow:0 24px 55px rgba(0,0,0,.42);
text-align:center;
overflow:hidden;
}

.touch-controls{
	display:none;
}

h1{
margin:0 0 4px 0;
font-size:clamp(26px,3.2vw,48px);
}

p{
margin:0 0 8px 0;
opacity:.9;
font-size:clamp(12px,1.5vw,20px);
}

canvas{
border:3px solid #c084fc;
background:#0f172a;
border-radius:12px;
box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), 0 10px 30px rgba(0,0,0,.4);
width:min(96vw,1100px);
max-height:calc(100vh - 165px);
height:auto;
touch-action:none;
-webkit-touch-callout:none;
-webkit-user-select:none;
user-select:none;
}

@media (max-height: 760px){
	.game-shell{padding:10px;}
	p{margin-bottom:6px;}
	canvas{max-height:calc(100vh - 130px);} 
}

@media (max-width: 900px){
	body{
		align-items:stretch;
		justify-content:center;
	}
	.game-shell{
		width:min(430px,94vw);
		min-height:100vh;
		max-height:100vh;
		padding:8px 8px 10px;
		border-radius:14px;
		display:flex;
		flex-direction:column;
		gap:6px;
	}
	h1{
		margin-bottom:2px;
		font-size:clamp(20px,6vw,30px);
	}
	p{
		margin-bottom:6px;
		font-size:clamp(11px,3.2vw,14px);
	}
	canvas{
		width:100%;
		max-height:calc(100vh - 230px);
		aspect-ratio:9 / 16;
		border-width:2px;
	}
	.touch-controls{
		display:flex;
		gap:8px;
		width:100%;
		height:74px;
		margin-top:auto;
	}
	.touch-btn{
		flex:1;
		border:1px solid rgba(255,255,255,.28);
		border-radius:12px;
		background:rgba(15,23,42,.82);
		color:#f8fafc;
		font-size:clamp(18px,5vw,24px);
		font-weight:700;
		touch-action:none;
		user-select:none;
	}
	.touch-btn:active,
	.touch-btn.pressed{
		background:rgba(16,185,129,.32);
		border-color:rgba(16,185,129,.92);
	}
	#btnAction{
		flex:1.1;
		font-size:clamp(14px,3.6vw,18px);
	}
}
</style>

</head>

<body>

<div class="game-shell">
<h1>ঈদ সালামি ধরো 🇧🇩</h1>
<p>Windows: ← → / A D · Android: Touch control · Space = শুরু/বিরতি · R = নতুন খেলা</p>

<canvas id="gameCanvas" width="900" height="450"></canvas>

<div class="touch-controls" id="touchControls" aria-label="Touch controls">
	<button class="touch-btn" id="btnLeft" type="button">◀ বাম</button>
	<button class="touch-btn" id="btnAction" type="button">শুরু / বিরতি</button>
	<button class="touch-btn" id="btnRight" type="button">ডান ▶</button>
</div>
</div>

<script src="game.js"></script>

</body>
</html>
